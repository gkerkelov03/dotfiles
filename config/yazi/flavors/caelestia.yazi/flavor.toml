# ====================================================================
# YAZI DYNAMIC TEMPLATE (STRICT SYMBOL MATCHING)
# Verified against provided color list
# ====================================================================

[manager]
cwd = { fg = "#32653E", italic = true }

# Hovered: Primary background with OnPrimary text
hovered = { fg = "#091f11", bg = "#24BD5C", bold = true }
preview_hovered = { underline = true, fg = "#24BD5C" }

# Selection
selection = { bg = "#1b1d22", fg = "#24BD5C" }
find_keyword = { fg = "#d0f9f4", italic = true, bold = true, underline = true }
find_position = { fg = "#24BD5C", bg = "reset", italic = true }

# Markers
marker_copied = { fg = "#213528", bg = "#B5CCBA" }
marker_cut = { fg = "#F5F4F6", bg = "#c66e73" }
marker_selected = { fg = "#091f11", bg = "#24BD5C" }
loading_style = { fg = "#24BD5C", bold = true }

# Layout
border_symbol = "│"
border_style = { fg = "#1E1E25" }

[manager.tab]
active = { fg = "#091f11", bg = "#24BD5C", bold = true }
inactive = { fg = "#c9c9c9", bg = "#23262C" }

# ====================================================================
# STATUS BAR & HEADER
# ====================================================================

[header]
title = { fg = "#24BD5C", bold = true }
device = { fg = "#979797" }
host = { fg = "#a0f9aa" }
user = { fg = "#65eea0" }

[status]
separator_open = ""
separator_close = ""

mode_normal = { fg = "#091f11", bg = "#24BD5C", bold = true }
mode_select = { fg = "#043a14", bg = "#24BD5C", bold = true }
mode_unset = { fg = "#F5F4F6", bg = "#c66e73", bold = true }

progress_label = { fg = "#F5F5F6", bold = true }
progress_normal = { fg = "#24BD5C", bg = "#23262C" }
progress_error = { fg = "#c66e73", bg = "#23262C" }

permissions = { fg = "#979797" }

# ====================================================================
# FILETYPES
# ====================================================================

[filetype]
rules = [
  { name = "*/", fg = "#65eea0", bold = true },
  { name = ".env*", fg = "#8af797", bold = true },
  { name = "*.{json,yaml,yml,toml,xml,conf,ini}", fg = "#cefb97" },
  { name = "*.{js,ts,jsx,tsx,py,rb,php,pl}", fg = "#d0f9f4" },
  { name = "*.{c,cpp,rs,go,swift,java}", fg = "#73fa90" },
  { name = "*.{sh,bash,zsh,fish,bat}", fg = "#8af797", bold = true },
  { name = "*.{jpg,jpeg,png,gif,webp,svg}", fg = "#a0f9aa" },
  { name = "*.{mp4,mkv,avi,webm,mov}", fg = "#90f79e" },
  { name = "*.{mp3,flac,wav,ogg}", fg = "#90f79e", italic = true },
  { name = "*.{zip,tar,gz,7z,rar,xz}", fg = "#abf0c5", bold = true },
  { name = "*.{md,mdx,txt,rst,org}", fg = "#85ef77", italic = true },
  { name = "*.pdf", fg = "#c66e73", bold = true },
  { name = "*", fg = "#F5F5F6" },
]

# ====================================================================
# UI COMPONENTS
# ====================================================================

[input]
border = { fg = "#24BD5C" }
title = { fg = "#24BD5C" }
value = { fg = "#F5F5F6" }
selected = { bg = "#232C29" }

[select]
border = { fg = "#24BD5C" }
active = { fg = "#24BD5C", bold = true }

[completion]
border = { fg = "#24BD5C" }
active = { bg = "#232C29", fg = "#24BD5C" }

[notify]
border = { fg = "#24BD5C" }

[notify.levels]
info = { fg = "#8af797" }
warn = { fg = "#d0f9f4" }
error = { fg = "#c66e73" }

[which-key]
cand = { fg = "#32653E" }
rest = { fg = "#24BD5C" }
desc = { fg = "#F5F5F6" }
separator = " ➜ "

[help]
on = { fg = "#24BD5C" }
run = { fg = "#24BD5C" }
hovered = { bg = "#232C29", fg = "#F5F5F6" }
footer = { fg = "#979797" }
