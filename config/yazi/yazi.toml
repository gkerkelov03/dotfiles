"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio = [1, 4, 3]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "none"
show_hidden = false
show_symlink = true
scrolloff = 5
mouse_events = ["click", "scroll"]

[preview]
wrap = "no"
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_delay = 30
image_filter = "triangle"
image_quality = 75
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
open = [{ run = "xdg-open %s1", desc = "Open", for = "linux", orphan = true }]
edit = [
  { run = '${EDITOR} "$@"', desc = "$EDITOR", for = "unix", block = true },
]
play = [{ run = "xdg-open %s1", desc = "Play", for = "linux", orphan = true }]
extract = [{ run = "ya pub extract --list %s", desc = "Extract here" }]
download = [
  { run = "ya emit download --open %S", desc = "Download and open" },
  { run = "ya emit download %S", desc = "Download" },
]

[open]
rules = [
  # Folder
  { url = "*/", use = [
    "edit",
  ] },
  # Text
  { mime = "text/*", use = [
    "edit",
  ] },
  # Image
  { mime = "image/*", use = [
    "open",
  ] },
  # Media
  { mime = "{audio,video}/*", use = [
    "play",
  ] },
  # Code
  { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [
    "edit",
  ] },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "extract",
  ] },
  # Empty file
  { mime = "inode/empty", use = [
    "edit",
  ] },
  # Virtual file system
  { mime = "vfs/{absent,stale}", use = "download" },
  # Fallback
  { url = "*", use = [
    "open",
  ] },
]

[plugin]
fetchers = [
  { id = "mime-dir", url = "*/", run = "mime.dir", prio = "high", group = "mime" },
  { id = "mime-local", url = "local://*", run = "mime.local", prio = "high", group = "mime" },
  { id = "mime-remote", url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
  { id = "git", url = "*", run = "git", group = "git" },
  { id = "git", url = "*/", run = "git", group = "git" },
]
spotters = [
  # Multi-file
  { id = "multi", mime = "multi/*", run = "multi" },
  # Folder
  { id = "folder", url = "*/", run = "folder" },
  # Code
  { id = "code-text", mime = "text/*", run = "code" },
  { id = "code-app", mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
  # Image
  { id = "img-magick", mime = "image/{avif,hei?,jxl}", run = "magick" },
  { id = "img-svg", mime = "image/svg+xml", run = "svg" },
  { id = "img-basic", mime = "image/*", run = "image" },
  # Video
  { id = "video", mime = "video/*", run = "video" },
  # Virtual file system
  { id = "vfs", mime = "vfs/*", run = "vfs" },
  # Error
  { id = "null", mime = "null/*", run = "null" },
  # Fallback
  { id = "fallback", url = "*", run = "file" },
]
preloaders = [
  # Image
  { id = "img-magick", mime = "image/{avif,hei?,jxl}", run = "magick" },
  { id = "img-svg", mime = "image/svg+xml", run = "svg" },
  { id = "img-basic", mime = "image/*", run = "image" },
  # Video
  { id = "video", mime = "video/*", run = "video" },
  # PDF
  { id = "pdf", mime = "application/pdf", run = "pdf" },
  # Font
  { id = "font-any", mime = "font/*", run = "font" },
  { id = "font-ms", mime = "application/ms-opentype", run = "font" },
]
previewers = [
  { id = "folder", url = "*/", run = "folder" },
  # Code
  { id = "code-text", mime = "text/*", run = "code" },
  { id = "code-app", mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
  # JSON
  { id = "json", mime = "application/{json,ndjson}", run = "json" },
  # Image
  { id = "img-magick", mime = "image/{avif,hei?,jxl}", run = "magick" },
  { id = "img-svg", mime = "image/svg+xml", run = "svg" },
  { id = "img-basic", mime = "image/*", run = "image" },
  # Video
  { id = "video", mime = "video/*", run = "video" },
  # PDF
  { id = "pdf", mime = "application/pdf", run = "pdf" },
  # Archive
  { id = "archive-std", mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
  { id = "archive-pkg", mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
  { id = "appimage", url = "*.{AppImage,appimage}", run = "archive" },
  # Virtual Disk / Disk Image
  { id = "iso", mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
  { id = "vbox", mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
  { id = "disk-raw", url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
  # Font
  { id = "font-any", mime = "font/*", run = "font" },
  { id = "font-ms", mime = "application/ms-opentype", run = "font" },
  # Empty file
  { id = "empty", mime = "inode/empty", run = "empty" },
  # Virtual file system
  { id = "vfs", mime = "vfs/*", run = "vfs" },
  # Error
  { id = "null", mime = "null/*", run = "null" },
  # Fallback
  { id = "fallback", url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title = ["Create:", "Create (dir):"]
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# filter
filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

[confirm]
# trash
trash_title = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [0, 0, 70, 20]

# delete
delete_title = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [0, 0, 70, 20]

# overwrite
overwrite_title = "Overwrite file?"
overwrite_body = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [0, 0, 50, 15]

# quit
quit_title = "Quit?"
quit_body = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
quit_origin = "center"
quit_offset = [0, 0, 50, 15]

[pick]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by = "key"
sort_sensitive = true
