

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(ff0000ff) rgba(ffffffff) 45deg
    
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1 
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(0a0a0aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}
