$mod = SUPER 
$alt = ALT
$shift = SHIFT 
$control = CONTROL

$terminal = foot 

$modules = ~/.config/hypr/modules
source = $modules/*.conf


#"Smart gaps" / "No gaps when only one window"
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

windowrule {
    name = no-gaps-wtv1
    match:float = false
    match:workspace = w[tv1]

    border_size = 0
    rounding = 0
}

windowrule {
    name = no-gaps-f1
    match:float = false
    match:workspace = f[1]

    border_size = 0
    rounding = 0
}
