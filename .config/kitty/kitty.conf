# --- Fonts ---

font_family      JetBrainsMono Nerd Font

bold_font        auto

italic_font      auto

bold_italic_font auto

font_size        11.0



# --- Window Layout ---

window_padding_width 15

confirm_os_window_close 0



# --- Transparency & Blur ---

# Note: Background blur requsitor like 'picom' on X11

background_opacity 0.85

background_blur    1



# --- Cursor ---

cursor_shape          beam

cursor_beam_thickness 1.5

cursor_blink_interval 0



# --- Colors (Tokyo Night Storm Theme) ---

background            #24283b

foreground            #c0caf5

selection_background  #364a82

selection_foreground  #c0caf5

url_color             #73daca

cursor                #c0caf5



# Tabs

active_tab_background   #7aa2f7

active_tab_foreground   #1f2335

inactive_tab_background #292e42

inactive_tab_foreground #545c7e



# Terminal Colors

# black

color0 #1d202f

color8 #414868

# red

color1 #f7768e

color9 #f7768e

# green

color2  #9ece6a

color10 #9ece6a

# yellow

color3  #e0af68
color11 #e0af68
# blue
color4  #7aa2f7
color12 #7aa2f7
# magenta
color5  #bb9af7
color13 #bb9af7
# cyan
color6  #7dcfff
color14 #7dcfff
# white
color7  #a9b1d6
color15 #c0caf5

# --- Mouse ---
mouse_hide_wait 3.0
detect_urls yes

# --- Performance ---
repaint_delay    10
input_delay      3
sync_to_monitor  yes
